<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/dcq_logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DentalQuoter</title>
    <script>
      var theme = localStorage.getItem('dqc_theme') || 'system';
      var isDark = theme === 'dark' || (theme === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
      if (isDark) document.documentElement.classList.add('dark');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
